# Optional conda environment for users who prefer conda-forge geospatial builds.
# The pip path (pyproject.toml) is the primary, CI-tested route.
name: wa-ecorehab-ai
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - scikit-image
  - matplotlib
  - seaborn
  - rich
  - tqdm
  - pyyaml
  - pydantic>=2
  - jinja2
  # geospatial
  - geopandas>=0.14
  - shapely>=2
  - pyproj
  - rasterio>=1.3
  - rioxarray
  - xarray
  - pyogrio
  - rtree
  - rasterstats
  # remote sensing / STAC
  - pystac-client
  - odc-stac
  # deep learning (CPU; install the CUDA build separately for GPU)
  - pytorch
  - torchvision
  - cpuonly
  # classical boosting
  - xgboost
  - lightgbm
  # dev
  - pytest
  - ruff
  - black
  - jupyter
  - nbconvert
  - pip
  - pip:
      - albumentations
      - segmentation-models-pytorch
      - timm
      - shap
      - leafmap
      - contextily
