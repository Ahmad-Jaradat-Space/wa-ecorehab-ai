# Gradient-boosted pixel baseline (requires the [boost] extra: xgboost).
# Falls back with a clear error if xgboost is not installed.
extends: aoi_swan_coastal_plain.yaml

classical:
  model_type: xgboost
  n_pixels_per_class: 20000
  params:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    tree_method: hist
  checkpoint: outputs/metrics/xgboost.joblib
