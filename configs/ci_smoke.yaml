# Tiny config for the CI integration smoke test: a small AOI + cheap models so the
# whole pipeline (data -> labels -> tiles -> RF -> U-Net -> inference -> report)
# runs in well under a minute. Not for real analysis.
extends: aoi_swan_coastal_plain.yaml

project:
  name: ci_smoke

aoi:
  name: ci_smoke

data:
  demo:
    size_px: 192
    seed: 42
    n_tenements: 1

tiling:
  tile_size: 64
  stride: 64
  split:
    block_size_px: 128

classical:
  model_type: random_forest
  n_pixels_per_class: 3000
  params: {n_estimators: 60, max_depth: 12, n_jobs: -1, class_weight: balanced}
  checkpoint: outputs/metrics/random_forest.joblib

segmentation:
  arch: unet
  base_channels: 8
  epochs: 3
  batch_size: 4
  patience: 3
  checkpoint: outputs/metrics/unet.pt

inference:
  checkpoint: outputs/metrics/unet.pt
  tile_size: 128
  overlap: 16

report:
  metrics_json: outputs/metrics/unet_metrics.json
