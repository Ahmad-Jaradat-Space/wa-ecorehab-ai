# RandomForest pixel baseline on the Swan Coastal Plain AOI.
extends: aoi_swan_coastal_plain.yaml

classical:
  model_type: random_forest
  n_pixels_per_class: 20000      # balanced per-class pixel sampling cap
  params:
    n_estimators: 300
    max_depth: 20
    min_samples_leaf: 5
    n_jobs: -1
    class_weight: balanced
  checkpoint: outputs/metrics/random_forest.joblib
